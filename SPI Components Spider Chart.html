const colors = ["#1f77b4", "#ff7f0e", "#2ca02c", "#d62728"];

let selected = [];

const controlsDiv = document.getElementById("controls");
const scoreDiv = document.getElementById("scorecards");

// ---- Create checkboxes ----
data.forEach((item, i) => {

    let label = document.createElement("label");
    let cb = document.createElement("input");

    cb.type = "checkbox";
    cb.value = i;

    cb.onchange = function() {
        if (this.checked) {
            if (selected.length >= 4) {
                alert("Max 4 municipalities");
                this.checked = false;
                return;
            }
            selected.push(i);
        } else {
            selected = selected.filter(x => x !== i);
        }
        update();
    }

    label.appendChild(cb);
    label.appendChild(document.createTextNode(" " + item.MUNICIPALITY));

    controlsDiv.appendChild(label);
    controlsDiv.appendChild(document.createElement("br"));
});

// ---- Update chart ----
function update() {

    let traces = [];
    scoreDiv.innerHTML = "";

    selected.forEach((i, idx) => {

        let row = data[i];

        let values = categories.map(c => row[c]);
        values.push(values[0]);

        traces.push({
            type:"scatterpolar",
            r: values,
            theta: styled_categories.concat(styled_categories[0]),
            fill:"toself",
            name: row.MUNICIPALITY,
            line: {color: colors[idx]},
            fillcolor: colors[idx] + "33",
            hovertemplate:"<b>%{theta}</b><br>Score: %{r:.1f}<extra></extra>"
        });

        // ---- Scorecard ----
        scoreDiv.innerHTML += `
        <div class="panel" style="border-left:5px solid ${colors[idx]};">
            <b>${row.MUNICIPALITY}</b><br><br>
            SPI: ${row.SPI}<br>
            BHN: ${row.BHN}<br>
            FW: ${row.FW}<br>
            O: ${row.O}
        </div>`;
    });

    let layout = {
        polar:{
            radialaxis:{
                range:[0,100],
                gridcolor:"#ccc"
            },
            angularaxis:{
                rotation:90,
                direction:"clockwise"
            }
        },
        showlegend:true,
        margin:{t:40,b:40,l:40,r:40}
    };

    Plotly.newPlot("chart", traces, layout);
}

update();
